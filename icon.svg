<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" aria-label="San Julian Trail">
  <defs>
    <linearGradient id="sjg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3ed079"/><stop offset="1" stop-color="#10864f"/>
    </linearGradient>
    <linearGradient id="sjgloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0"/>
